<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>UrbanCart</title>
<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f4f4f4;
}

/* Navbar */
.navbar {
  background: #111;
  color: white;
  padding: 15px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

button {
  padding: 8px 12px;
  border: none;
  background: black;
  color: white;
  cursor: pointer;
}

/* Products */
.products {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  padding: 20px;
  gap: 20px;
}

.product {
  background: white;
  padding: 15px;
  border-radius: 10px;
  text-align: center;
}

.product img {
  width: 100%;
  height: 180px;
  object-fit: cover;
}

/* Cart */
.cart-btn {
  background: orange;
}

/* Modal (Payment Page) */
.modal {
  display: none;
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(0,0,0,0.7);
}

.modal-content {
  background: white;
  width: 300px;
  margin: 100px auto;
  padding: 20px;
  border-radius: 10px;
}

input {
  width: 100%;
  padding: 8px;
  margin: 5px 0;
}
</style>
</head>

<body>

<div class="navbar">
  <h2>🛍️ UrbanCart</h2>
  <button class="cart-btn" onclick="openCheckout()">Checkout 🧾</button>
</div>

<div class="products" id="productList"></div>

<!-- Payment Modal -->
<div class="modal" id="paymentModal">
  <div class="modal-content">
    <h3>💳 Payment</h3>
    <p>Total: ₹<span id="totalAmount"></span></p>

    <input type="text" placeholder="Card Number">
    <input type="text" placeholder="Name on Card">
    <input type="text" placeholder="Expiry Date">
    <input type="text" placeholder="CVV">

    <button onclick="payNow()">Pay Now</button>
  </div>
</div>

<script>
const products = [
  {
    name: "Running Shoes",
    price: 1999,
    img: "https://images.unsplash.com/photo-1542291026-7eec264c27ff"
  },
  {
    name: "Smart Watch",
    price: 2999,
    img: "https://images.unsplash.com/photo-1511732351661-9b1d3c4a2c8c"
  },
  {
    name: "Backpack",
    price: 999,
    img: "https://images.unsplash.com/photo-1503342217505-b0a15ec3261c"
  },
  {
    name: "Headphones",
    price: 1499,
    img: "https://images.unsplash.com/photo-1518449038026-3b6c3e3f6e6e"
  },
  {
    name: "T-Shirt",
    price: 499,
    img: "https://images.unsplash.com/photo-1521572163474-6864f9cf17ab"
  }
];

let cart = [];

function displayProducts() {
  const container = document.getElementById("productList");

  products.forEach((p, i) => {
    container.innerHTML += `
      <div class="product">
        <img src="${p.img}">
        <h3>${p.name}</h3>
        <p>₹${p.price}</p>
        <button onclick="addToCart(${i})">Add to Cart</button>
      </div>
    `;
  });
}

function addToCart(index) {
  cart.push(products[index]);
  alert(products[index].name + " added to cart!");
}

function openCheckout() {
  if (cart.length === 0) {
    alert("Cart is empty!");
    return;
  }

  let total = cart.reduce((sum, item) => sum + item.price, 0);
  document.getElementById("totalAmount").textContent = total;

  document.getElementById("paymentModal").style.display = "block";
}

function payNow() {
  alert("✅ Payment Successful! Order Placed.");
  cart = [];
  document.getElementById("paymentModal").style.display = "none";
}
displayProducts();
</script>

</body>
</html>
